services:
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    depends_on:
      - mcp-server
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_SERVER_URL=http://mcp-server:8081
      - SPRING_PROFILES_ACTIVE=docker
    stdin_open: true
    tty: true
