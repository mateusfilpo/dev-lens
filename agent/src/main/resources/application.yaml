spring:
  application:
    name: dev-lens-agent
  main:
    web-application-type: none
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
    mcp:
      client:
        enabled: true
        name: dev-lens-agent
        version: 0.0.1
        type: SYNC
        sse:
          connections:
            dev-lens-server:
              url: ${MCP_SERVER_URL:http://localhost:8081}